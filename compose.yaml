name: minimalist-presentation-mcp

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      MESSAGE_FIRST_DECK_HOST: 0.0.0.0
      MESSAGE_FIRST_DECK_PORT: "3000"
      MESSAGE_FIRST_DECK_DATA_DIR: /data
      MESSAGE_FIRST_DECK_PUBLIC_BASE_URL: ${PUBLIC_BASE_URL:-http://localhost:${APP_PORT:-13000}}
      MESSAGE_FIRST_DECK_ALLOWED_HOSTS: ${ALLOWED_HOSTS:-127.0.0.1,localhost,app.internal}
      MESSAGE_FIRST_DECK_ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    expose:
      - "3000"
    volumes:
      - app_data:/data
    restart: unless-stopped
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=32m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 256
    mem_limit: 512m
    cpus: 1.0
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - 'import socket; s=socket.create_connection(("127.0.0.1", 3000), 3); s.close()'
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - app_net

  localproxy:
    image: alpine/socat:1.8.0.3
    depends_on:
      app:
        condition: service_healthy
    command:
      - TCP-LISTEN:3000,fork,reuseaddr
      - TCP:app:3000
    ports:
      - "127.0.0.1:${APP_PORT:-13000}:3000"
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    pids_limit: 128
    mem_limit: 64m
    cpus: 0.25
    networks:
      - app_net
      - ingress_net

  cloudflared:
    image: cloudflare/cloudflared:2026.3.0@sha256:6b599ca3e974349ead3286d178da61d291961182ec3fe9c505e1dd02c8ac31b0
    profiles:
      - tunnel
    depends_on:
      app:
        condition: service_healthy
    command:
      - tunnel
      - --no-autoupdate
      - run
      - --token
      - ${CLOUDFLARE_TUNNEL_TOKEN:-}
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=64m
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 128m
    cpus: 0.5
    networks:
      - app_net
      - egress_net

networks:
  app_net:
    internal: true
  ingress_net:
  egress_net:

volumes:
  app_data:
